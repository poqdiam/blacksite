quiz:
  daily: true
  question_count: 15     # questions shown per daily quiz attempt
  pass_threshold: 75     # minimum percentage to pass (0–100)

db:
  path: "blacksite.db"

storage:
  uploads_dir: "uploads"
  results_dir: "results"
  controls_dir: "controls"

nist:
  catalog_url: "https://raw.githubusercontent.com/usnistgov/oscal-content/main/nist.gov/SP800-53/rev5/json/NIST_SP-800-53_rev5_catalog.json"
  github_api_url: "https://api.github.com/repos/usnistgov/oscal-content/commits?path=nist.gov%2FSP800-53%2Frev5%2Fjson%2FNIST_SP-800-53_rev5_catalog.json&per_page=1"
  local_path: "controls/nist_800_53r5.json"
  local_meta: "controls/meta.json"
  # NIST does not publish at a fixed daily time — update nightly at midnight
  update_cron: "0 0 * * *"

email:
  enabled: true
  # Credentials are in /etc/blacksite/email.conf (root:root, 600) — not here.
  # Run: sudo bash /home/graycat/scripts/setup-blacksite-email.sh <gmail> <app-password>
  from_address: "BLACKSITE <daniel@thekramerica.com>"
  to_address: "daniel@thekramerica.com"

scoring:
  # Weight for SSP vs quiz in combined score
  ssp_weight: 0.70
  quiz_weight: 0.30
  # Thresholds for All Star designation
  allstar_combined_min: 80
  allstar_quiz_min: 80

demo:
  db_path: "/home/graycat/projects/blacksite-demo/stock.db"   # demo visitor IP log source

ai:
  enabled: false
  provider: "claude"               # claude | openai
  api_key: ""                      # leave blank to use rule-based only
  model: "claude-haiku-4-5-20251001"  # cheapest model for classification tasks
  review_on_complete: false        # auto-trigger AI review when assessment completes

grc:
  # Short name of the compliance framework pre-selected by default on new system registration.
  # Must match a short_name in compliance_frameworks table. Set to "" to disable.
  default_framework: "csf2"

security:
  il4_mode: false              # Enforces IL4 compliance checks at startup
  cac_piv_auth: false          # Parse identity from client certificate header instead of Remote-User
  cac_header: "X-Client-Cert-Subject"   # Header Caddy injects with cert Subject DN
  cac_cn_prefix: ""            # Optional prefix to strip from CN (e.g. "DOD CA ")
  require_mfa: false           # MFA enforced at perimeter by Authelia (two_factor policy); in-app header check disabled
  db_encryption: true          # SQLCipher AES-256 at-rest encryption — pysqlcipher3 installed ✓
  db_encryption_key_env: BLACKSITE_DB_KEY   # env var name holding the encryption key
  fips_session_crypto: false   # [PROD GUARD] Require FIPS-validated session crypto — do not enable in dev
  audit_all_requests: false    # Log every HTTP request to security_events table (verbose)

# ── SSO / OIDC Identity Provider ──────────────────────────────────────────────
# Works with Keycloak, Okta, Azure AD, Auth0, or any OIDC-compliant provider.
# When enabled, users without a Remote-User header (no Authelia) are redirected
# to the provider's login page. Existing Authelia deployments are unaffected —
# Remote-User header always takes precedence over SSO session cookie.
#
# Keycloak discovery_url:  https://<host>/realms/<realm>/.well-known/openid-configuration
# Okta discovery_url:      https://<okta-domain>/.well-known/openid-configuration
# Azure AD discovery_url:  https://login.microsoftonline.com/<tenant>/v2.0/.well-known/openid-configuration
geo_restrict:
  # Restricts /api/geo-check to allowed countries (ISO 3166-1 alpha-2).
  # Used by Caddy forward_auth to gate demo.borisov.network and standin.borisov.network.
  # Set enabled: false to disable all geo blocking (all countries pass through).
  enabled: true
  allowed_countries:
    - US
  fail_open: true   # true = allow on lookup failure (ip-api.com down); false = deny on failure

sso:
  enabled: false
  provider: "keycloak"           # keycloak | okta | azure | generic  (label only)
  client_id: ""
  client_secret: ""              # Use env var BLACKSITE_SSO_SECRET in production
  discovery_url: ""
  redirect_uri: ""               # Full callback URL: https://blacksite.example.com/auth/callback
  scopes: "openid profile email"
  role_claim: "groups"           # JWT claim that carries group/role list
  role_map:                      # Provider group name → blacksite role
    blacksite-admins:   admin
    blacksite-isso:     isso
    blacksite-issm:     issm
    blacksite-ciso:     ciso
    blacksite-ao:       ao
    blacksite-sca:      sca
    blacksite-auditor:  auditor
  auto_provision: true           # Create UserProfile on first successful OIDC login
  session_max_age: 28800         # Cookie lifetime in seconds (8 hours)
